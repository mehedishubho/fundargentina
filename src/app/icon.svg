    <rect x="20.5" y="15.25" width="2.5" height="1.5" rx="0.5"/>
    <rect x="11" y="10.5" width="1.5" height="2.5" rx="0.5" transform="rotate(-45 11.75 11.75)"/>
    <rect x="19.5" y="19" width="1.5" height="2.5" rx="0.5" transform="rotate(-45 20.25 20.25)"/>
    <rect x="19.5" y="10.5" width="1.5" height="2.5" rx="0.5" transform="rotate(45 20.25 11.75)"/>
    <rect x="11" y="19" width="1.5" height="2.5" rx="0.5" transform="rotate(45 11.75 20.25)"/>
