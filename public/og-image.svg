<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6EC1FF"/>
      <stop offset="100%" stop-color="#4AA3E0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Blue orbs -->
  <circle cx="200" cy="150" r="200" fill="rgba(110,193,255,0.08)" filter="blur(80px)"/>
  <circle cx="1000" cy="500" r="250" fill="rgba(110,193,255,0.06)" filter="blur(100px)"/>
  <circle cx="600" cy="300" r="150" fill="rgba(245,166,35,0.05)" filter="blur(60px)"/>

  <!-- Flag stripes -->
  <rect x="80" y="180" width="120" height="40" fill="url(#blue)" rx="4"/>
  <rect x="80" y="225" width="120" height="40" fill="white" rx="4"/>
  <rect x="80" y="270" width="120" height="40" fill="url(#blue)" rx="4"/>
  <circle cx="140" cy="245" r="12" fill="#F6B40E"/>

  <!-- Trophy icon -->
  <g transform="translate(80, 340)">
    <path d="M30 0 L90 0 L85 40 Q60 55 35 40 Z" fill="url(#gold)"/>
    <rect x="50" y="40" width="20" height="15" fill="#D4900A" rx="2"/>
    <rect x="38" y="52" width="44" height="8" fill="#D4900A" rx="3"/>
    <polygon points="60,10 63,18 72,18 65,23 68,31 60,26 52,31 55,23 48,18 57,18" fill="white" opacity="0.9"/>
  </g>

  <!-- Main text -->
  <text x="260" y="200" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" letter-spacing="-1">
    Fund
  </text>
  <text x="410" y="200" fill="#6EC1FF" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" letter-spacing="-1">
    Argentina
  </text>

  <!-- Subtitle -->
  <text x="260" y="270" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="32" opacity="0.7">
    The World's Most Important
  </text>
  <text x="260" y="310" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="32" opacity="0.7">
    Fake Fundraiser
  </text>

  <!-- Stats row -->
  <g transform="translate(260, 380)">
    <text x="0" y="0" fill="#6EC1FF" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold">$8.7M</text>
    <text x="0" y="25" fill="rgba(255,255,255,0.4)" font-family="system-ui, -apple-system, sans-serif" font-size="14">Raised</text>

    <text x="150" y="0" fill="#F5A623" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold">47,293</text>
    <text x="150" y="25" fill="rgba(255,255,255,0.4)" font-family="system-ui, -apple-system, sans-serif" font-size="14">Donors</text>

    <text x="330" y="0" fill="#22c55e" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold">87%</text>
    <text x="330" y="25" fill="rgba(255,255,255,0.4)" font-family="system-ui, -apple-system, sans-serif" font-size="14">Goal</text>
  </g>

  <!-- URL -->
  <text x="600" y="590" fill="rgba(255,255,255,0.3)" font-family="system-ui, -apple-system, sans-serif" font-size="18" text-anchor="middle">
    fundargentina.com
  </text>

  <!-- Disclaimer badge -->
  <rect x="260" y="440" width="200" height="28" fill="rgba(255,255,255,0.05)" rx="14"/>
  <text x="360" y="459" fill="rgba(255,255,255,0.4)" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle">
    *Satire — No real donations
  </text>
</svg>
